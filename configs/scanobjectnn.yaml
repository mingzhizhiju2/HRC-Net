task: classification
dataset: scanobjectnn
data_root: ./datasets/scanobjectnn
num_classes: 15
num_points: 1024
batch_size: 32
epochs: 250
num_workers: 4

optimizer:
  name: adam
  lr: 0.001
  weight_decay: 1.0e-4

scheduler:
  name: cosine
  min_lr: 1.0e-5

model:
  name: hrcnet_cls
  input_channels: 3
  stem_channels: 64
  attention_reduction: 4
  encoder:
    - sample_count: 512
      k: 32
      out_channels: 128
      band_edges: [0.25, 0.5, 0.75, 1.0]
    - sample_count: 256
      k: 16
      out_channels: 256
      band_edges: [0.25, 0.5, 0.75, 1.0]
    - sample_count: 128
      k: 8
      out_channels: 512
      band_edges: [0.25, 0.5, 0.75, 1.0]
  classifier:
    hidden_channels: [256, 128]
    dropout: 0.5
